name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check
        run: cargo check

      - name: Test
        run: cargo test

  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            image: x86_64-musl
            asset: stay-x86_64-linux-musl
          - target: aarch64-unknown-linux-musl
            image: aarch64-musl
            asset: stay-aarch64-linux-musl

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static binary
        run: |
          docker run --rm \
            -v "$PWD":/home/rust/src \
            messense/rust-musl-cross:${{ matrix.image }} \
            cargo build --release --target ${{ matrix.target }}

      - name: Prepare asset
        run: |
          cp "target/${{ matrix.target }}/release/stay" "${{ matrix.asset }}"
          chmod +x "${{ matrix.asset }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
